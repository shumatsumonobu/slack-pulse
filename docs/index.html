<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slack Pulse — チームの見えない繋がりを、光で描く</title>
  <meta property="og:title" content="Slack Pulse">
  <meta property="og:description" content="チームの見えない繋がりを、光で描く">
  <meta property="og:image" content="https://shumatsumonobu.github.io/slack-pulse/ogp.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shumatsumonobu.github.io/slack-pulse/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Slack Pulse">
  <meta name="twitter:description" content="チームの見えない繋がりを、光で描く">
  <meta name="twitter:image" content="https://shumatsumonobu.github.io/slack-pulse/ogp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Noto+Sans+JP:wght@400;600&family=JetBrains+Mono:wght@400;700&family=M+PLUS+1+Code:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e1a;
      color: #c9d1d9;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      overflow: hidden;
    }
    .intro {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1.5s ease-out;
    }
    .intro.fade-out {
      opacity: 0;
    }
    .intro-title {
      font-size: 28px;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .intro-sub {
      display: flex;
      gap: 32px;
      margin-top: 4px;
    }
    .intro-item {
      font-size: 14px;
      color: #e6edf3;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }
    svg { display: block; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── 診断パネル ── */
    .diag {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 340px;
      background: transparent;
      border: 1px solid rgba(0, 255, 200, 0.15);
      border-radius: 6px;
      padding: 16px 18px;
      font-family: 'M PLUS 1 Code', 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #00ffc8;
      z-index: 10;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.8s ease-in;
    }
    .diag.visible { opacity: 1; }
    .diag-header {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0, 255, 200, 0.5);
      border-bottom: 1px solid rgba(0, 255, 200, 0.1);
      padding-bottom: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .diag-header .toggle {
      font-size: 8px;
      transition: transform 0.3s;
    }
    .diag.collapsed .diag-header .toggle {
      transform: rotate(180deg);
    }
    .diag-body {
      overflow: hidden;
      max-height: 400px;
      transition: max-height 0.4s ease, opacity 0.3s;
    }
    .diag.collapsed .diag-body {
      max-height: 0;
      opacity: 0;
    }
    .diag.collapsed .diag-header {
      border-bottom: none;
      margin-bottom: 0;
    }
    .diag-score {
      font-size: 22px;
      font-weight: normal;
      margin-bottom: 4px;
    }
    .diag-score .label {
      font-size: 12px;
      font-weight: normal;
      margin-left: 8px;
      padding: 2px 6px;
      border: 1px solid rgba(0, 255, 200, 0.3);
      border-radius: 3px;
    }
    .diag-summary {
      color: #00ffc8;
      font-size: 11px;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .diag-line {
      color: #00ffc8;
      margin-bottom: 5px;
      opacity: 0;
      line-height: 1.4;
    }
    .diag-line.show { opacity: 1; transition: opacity 0.3s; }
    .diag-line .prefix {
      color: rgba(0, 255, 200, 0.4);
      margin-right: 4px;
    }
    .diag-line.risk .prefix { color: rgba(0, 255, 200, 0.6); }
    .diag-line.rec .prefix { color: rgba(0, 255, 200, 0.6); }
    /* ── フッターリンク ── */
    .footer-links {
      position: fixed;
      bottom: 12px;
      left: 16px;
      font-family: 'M PLUS 1 Code', 'JetBrains Mono', monospace;
      font-size: 11px;
      z-index: 10;
      display: flex;
      gap: 16px;
    }
    .footer-links a {
      color: #00ffc8;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .footer-links a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="intro" id="intro">
    <div class="intro-title">チームの見えない繋がりを、光で描く</div>
    <div class="intro-sub">
      <span class="intro-item">Slackのやり取りをリアルタイムに可視化</span>
    </div>
  </div>
  <svg id="graph"></svg>

  <div class="footer-links">
    <a href="https://github.com/shumatsumonobu/slack-pulse" target="_blank">GitHub</a>
    <a href="https://x.com/shumatsumonobu" target="_blank">@shumatsumonobu</a>
  </div>

  <div class="diag" id="diag">
    <div class="diag-header" onclick="document.getElementById('diag').classList.toggle('collapsed')">
      DIAGNOSIS <span class="toggle">▼</span>
    </div>
    <div class="diag-body" id="diag-body"></div>
  </div>

  <script>
    // イントロをフェードアウト（グラフ準備後に呼ばれる）
    function fadeOutIntro() {
      const intro = document.getElementById("intro");
      if (!intro) return;
      intro.classList.add("fade-out");
      setTimeout(() => intro.remove(), 1500);
      // イントロが消えた後に診断パネルを表示
      setTimeout(showDiagnosis, 300);
    }

    function showDiagnosis() {
      fetch("data/diagnosis.json")
        .then(r => r.ok ? r.json() : fetch("data/diagnosis.sample.json").then(r => r.ok ? r.json() : null))
        .catch(() => fetch("data/diagnosis.sample.json").then(r => r.ok ? r.json() : null).catch(() => null))
        .then(d => {
          if (!d) return;  // diagnosis.json がなければパネル非表示
          const body = document.getElementById("diag-body");
          const lines = [];
          // スコア
          body.innerHTML = `<div class="diag-score">${d.overall_score}/100 <span class="label">${d.overall_label}</span></div>`
            + `<div class="diag-summary">${d.summary}</div>`;
          // ハブ
          if (d.hubs) {
            const names = d.hubs.map(h => h.name).join(", ");
            lines.push(`<div class="diag-line"><span class="prefix">&gt;</span> ハブ検出: ${names}</div>`);
          }
          // リスク
          if (d.risks) {
            d.risks.forEach(r => {
              lines.push(`<div class="diag-line risk"><span class="prefix">!</span> ${r.description}</div>`);
            });
          }
          // 推奨
          if (d.recommendations) {
            d.recommendations.forEach(r => {
              lines.push(`<div class="diag-line rec"><span class="prefix">→</span> ${r}</div>`);
            });
          }
          body.innerHTML += lines.join("");
          // パネル表示 → 1行ずつタイプライター風
          const diag = document.getElementById("diag");
          diag.classList.add("visible");
          body.querySelectorAll(".diag-line").forEach((el, i) => {
            setTimeout(() => el.classList.add("show"), 400 * (i + 1));
          });
        });
    }

    let width = window.innerWidth;
    let height = window.innerHeight;

    const svg = d3.select("#graph")
      .attr("width", width)
      .attr("height", height);

    let _simulation = null;
    let _fitAll = null;  // remap + fit の共通関数
    window.addEventListener("resize", () => {
      width = window.innerWidth;
      height = window.innerHeight;
      svg.attr("width", width).attr("height", height);
      if (_simulation && _fitAll) {
        _simulation.force("center", d3.forceCenter(width / 2, height / 2));
        _simulation.alpha(0.05).restart();
        setTimeout(() => _fitAll(), 500);
      }
    });

    // グロー効果のフィルター
    const defs = svg.append("defs");
    const filter = defs.append("filter").attr("id", "glow");
    filter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "blur");
    filter.append("feMerge")
      .selectAll("feMergeNode")
      .data(["blur", "SourceGraphic"])
      .join("feMergeNode")
      .attr("in", d => d);

    // パーティクル用の強いグロー
    const glowStrong = defs.append("filter").attr("id", "glow-strong").attr("x", "-100%").attr("y", "-100%").attr("width", "300%").attr("height", "300%");
    glowStrong.append("feGaussianBlur").attr("stdDeviation", "2").attr("result", "blur1");
    const merge = glowStrong.append("feMerge");
    merge.append("feMergeNode").attr("in", "blur1");
    merge.append("feMergeNode").attr("in", "SourceGraphic");

    // パーティクル用のグラデーション（中心が白、外側が青）
    const radGrad = defs.append("radialGradient").attr("id", "particle-glow");
    radGrad.append("stop").attr("offset", "0%").attr("stop-color", "#ffffff").attr("stop-opacity", 1);
    radGrad.append("stop").attr("offset", "50%").attr("stop-color", "#ffffff").attr("stop-opacity", 0.6);
    radGrad.append("stop").attr("offset", "100%").attr("stop-color", "#ffffff").attr("stop-opacity", 0);

    const g = svg.append("g");
    let currentTransform = d3.zoomIdentity;

    // ズーム（スムーズ + 細かい刻み）
    const zoom = d3.zoom()
      .scaleExtent([0.2, 8])
      .wheelDelta(e => -e.deltaY * 0.002)  // 刻みを細かく
      .on("zoom", (e) => {
        g.attr("transform", e.transform);
        currentTransform = e.transform;
        if (typeof label !== "undefined") updateLabels();
      });
    svg.call(zoom)
      .on("dblclick.zoom", null);  // ダブルクリックズーム無効化

    d3.json("data/graph-data.json").catch(() => d3.json("data/graph-data.sample.json")).then(data => {
      if (!data || !data.nodes.length) {
        svg.append("text")
          .attr("x", width / 2)
          .attr("y", height / 2)
          .attr("text-anchor", "middle")
          .attr("fill", "#8b949e")
          .text("graph-data.json が見つかりません。npm run fetch を先に実行してください。");
        return;
      }

      // レイアウト定数（ウィンドウとノード数から動的に算出）
      const idealSpacing = Math.sqrt((width * height) / data.nodes.length);
      const CHARGE_STRENGTH = -(idealSpacing * 3);  // ノード間の反発力
      const LINK_DISTANCE = idealSpacing * 0.5;     // エッジの自然長
      const COLLISION_SCALE = 2.5;                  // ノード半径に対する衝突半径の倍率
      const FIT_FILL = 1.0;              // 画面に対するフィット率（1.0 = 画面いっぱい）
      const FIT_MAX_SCALE = Infinity;    // ズーム上限なし（画面にフィットさせる）
      const EDGE_OPACITY_MIN = 0.25;      // エッジの最低透明度
      const EDGE_OPACITY_MAX = 0.6;       // エッジの最大透明度
      const LABEL_SIZE = 12;              // ラベルのフォントサイズ
      const LABEL_GAP = 6;               // ラベルとノードの間隔

      // スコアの範囲を計算
      const maxScore = d3.max(data.edges, d => d.score);
      const linkWidth = d3.scaleLinear().domain([1, maxScore]).range([1, 8]);
      const linkOpacity = d3.scaleLinear().domain([1, maxScore]).range([EDGE_OPACITY_MIN, EDGE_OPACITY_MAX]);

      // ノードの接続数でサイズを決める
      const connectionCount = {};
      data.edges.forEach(e => {
        connectionCount[e.source] = (connectionCount[e.source] || 0) + e.score;
        connectionCount[e.target] = (connectionCount[e.target] || 0) + e.score;
      });
      const maxConn = Math.max(...Object.values(connectionCount), 1);
      const nodeRadius = d3.scalePow().exponent(0.7).domain([1, maxConn]).range([3, 60]);

      // カラーパレット
      // サイバーパンクカラー
      const cyberColors = [
        "#ff2a6d", // ホットピンク
        "#05d9e8", // シアン
        "#d300c5", // マゼンタ
        "#7b2ff7", // パープル
        "#01ffc3", // ライム
        "#ff6e27", // ネオンオレンジ
        "#f5e642", // エレクトリックイエロー
        "#00b3ff", // ブライトブルー
        "#ff4ecd", // ピンク
        "#39ff14", // ネオングリーン
      ];
      const color = d3.scaleOrdinal(cyberColors);

      const simulation = _simulation = d3.forceSimulation(data.nodes)
        .force("link", d3.forceLink(data.edges)
          .id(d => d.id)
          .distance(LINK_DISTANCE)
        )
        .force("charge", d3.forceManyBody().strength(CHARGE_STRENGTH))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(d => nodeRadius(connectionCount[d.id] || 1) * COLLISION_SCALE).strength(1));

      // エッジ描画
      const link = g.append("g")
        .selectAll("line")
        .data(data.edges)
        .join("line")
        .attr("stroke", "#58a6ff")
        .attr("stroke-width", 0.5)
        .attr("stroke-opacity", d => linkOpacity(d.score));

      // ノード描画
      const node = g.append("g")
        .selectAll("circle")
        .data(data.nodes)
        .join("circle")
        .attr("r", d => nodeRadius(connectionCount[d.id] || 1))
        .attr("fill", (d, i) => color(i))
        .attr("stroke", "none")
        .style("cursor", "pointer")
        .style("filter", "url(#glow)")
        .call(d3.drag()
          .on("start", (e, d) => {
            if (!e.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on("end", (e, d) => {
            if (!e.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
          })
        );

      // ラベル描画（ノードと同じgグループ内 → 同時に描画される）
      const label = g.append("g").selectAll("text")
        .data(data.nodes)
        .join("text")
        .text(d => {
          const name = d.name || d.id;
          return name.length > 6 ? name.slice(0, 6) + "…" : name;
        })
        .attr("font-size", LABEL_SIZE)
        .attr("font-weight", "400")
        .attr("fill", "#ffffff")
        .attr("text-anchor", "middle")
        .attr("dy", 0)
        .style("pointer-events", "none");

      // ホバーでノード強調（繋がってるエッジを光らせる）
      node.on("mouseover", (e, d) => {
        link.attr("stroke-opacity", l =>
          (l.source.id === d.id || l.target.id === d.id) ? 0.5 : 0.05
        );
      })
      .on("mouseout", () => {
        link.attr("stroke-opacity", d => linkOpacity(d.score));
      });

      // パーティクル（粒子が線上を流れる）
      const particleLayer = g.append("g");
      const particles = [];

      // スコアに応じた粒子数を生成（密なほど多い）
      const particleCount = d3.scalePow().exponent(1.5).domain([1, maxScore]).range([1, 8]);
      data.edges.forEach(edge => {
        const count = Math.round(particleCount(edge.score));
        for (let i = 0; i < count; i++) {
          particles.push({
            edge,
            t: Math.random(),                          // 0-1 の位置
            speed: (0.0005 + (edge.score / maxScore) * 0.012) * (0.7 + Math.random() * 0.6),  // 密なほど速い、差を大きく
            size: 1.5 + Math.random() * 2,
          });
        }
      });

      const particleDots = particleLayer.selectAll("circle")
        .data(particles)
        .join("circle")
        .attr("r", d => d.size * 1.2)
        .attr("fill", "url(#particle-glow)")
        .attr("opacity", 0.9)
        .style("filter", "url(#glow-strong)");

      function animateParticles() {
        particles.forEach(p => {
          p.t += p.speed;
          if (p.t > 1) p.t -= 1;
        });

        particleDots
          .attr("cx", d => {
            const s = d.edge.source, t = d.edge.target;
            return s.x + (t.x - s.x) * d.t;
          })
          .attr("cy", d => {
            const s = d.edge.source, t = d.edge.target;
            return s.y + (t.y - s.y) * d.t;
          });

        requestAnimationFrame(animateParticles);
      }
      // アニメーション定義（開始はfitAll後）
      function breathe() {
        node.transition()
          .duration(() => 1500 + Math.random() * 2000)
          .attr("opacity", () => 0.6 + Math.random() * 0.4)
          .on("end", function () {
            d3.select(this).transition()
              .duration(() => 1500 + Math.random() * 2000)
              .attr("opacity", 1)
              .on("end", breathe.bind(null));
          });
      }
      function edgePulse() {
        link.transition()
          .duration(() => 2000 + Math.random() * 3000)
          .attr("stroke-opacity", d => linkOpacity(d.score) * (0.5 + Math.random() * 0.5))
          .transition()
          .duration(() => 2000 + Math.random() * 3000)
          .attr("stroke-opacity", d => linkOpacity(d.score))
          .on("end", edgePulse);
      }

      // 全ノードを画面にフィットさせる
      function fitToScreen(animate = true) {
        // ノード半径を含むバウンディングボックス（データ座標）
        const nr = d => nodeRadius(connectionCount[d.id] || 1);
        const x0 = Math.min(...data.nodes.map(d => d.x - nr(d)));
        const x1 = Math.max(...data.nodes.map(d => d.x + nr(d)));
        const y0 = Math.min(...data.nodes.map(d => d.y - nr(d)));
        const y1 = Math.max(...data.nodes.map(d => d.y + nr(d)));
        const bw = x1 - x0 || 1, bh = y1 - y0 || 1;

        // スクリーン余白（最小限）
        const marginTop = LABEL_SIZE + LABEL_GAP;
        const marginOther = 5;
        const availW = width - marginOther * 2;
        const availH = height - marginTop - marginOther;

        const scale = Math.min(availW / bw, availH / bh, FIT_MAX_SCALE) * FIT_FILL;
        const tx = marginOther + (availW - bw * scale) / 2 - x0 * scale;
        const ty = marginTop + (availH - bh * scale) / 2 - y0 * scale;

        console.log("[fitToScreen]", {
          viewport: { width, height },
          bbox: { x0: x0.toFixed(0), x1: x1.toFixed(0), y0: y0.toFixed(0), y1: y1.toFixed(0), bw: bw.toFixed(0), bh: bh.toFixed(0) },
          avail: { availW: availW.toFixed(0), availH: availH.toFixed(0) },
          scales: { scaleX: (availW / bw).toFixed(3), scaleY: (availH / bh).toFixed(3), final: scale.toFixed(3) },
          transform: { tx: tx.toFixed(0), ty: ty.toFixed(0), scale: scale.toFixed(3) },
          fillPercent: { x: ((bw * scale / availW) * 100).toFixed(1) + "%", y: ((bh * scale / availH) * 100).toFixed(1) + "%" }
        });

        if (animate) {
          svg.transition().duration(800).call(
            zoom.transform,
            d3.zoomIdentity.translate(tx, ty).scale(scale)
          );
        } else {
          svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        }
      }
      // シミュレーション完了後にノード座標を画面アスペクト比に合わせてストレッチ
      function remapToViewport() {
        const xs = data.nodes.map(d => d.x);
        const ys = data.nodes.map(d => d.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        const dataW = maxX - minX || 1;
        const dataH = maxY - minY || 1;
        const dataCx = (minX + maxX) / 2;
        const dataCy = (minY + maxY) / 2;

        // fitToScreenと同じ利用可能領域のアスペクト比を使う
        const marginTop = LABEL_SIZE + LABEL_GAP;
        const marginOther = 5;
        const availW = width - marginOther * 2;
        const availH = height - marginTop - marginOther;

        const dataAspect = dataW / dataH;
        const viewAspect = availW / availH;

        let sx = 1, sy = 1;
        if (viewAspect > dataAspect) {
          sx = viewAspect / dataAspect;
        } else {
          sy = dataAspect / viewAspect;
        }

        console.log("[remapToViewport]", {
          before: { dataW: dataW.toFixed(0), dataH: dataH.toFixed(0), dataAspect: dataAspect.toFixed(3) },
          target: { availW: availW.toFixed(0), availH: availH.toFixed(0), viewAspect: viewAspect.toFixed(3) },
          stretch: { sx: sx.toFixed(3), sy: sy.toFixed(3) }
        });

        data.nodes.forEach(d => {
          d.x = dataCx + (d.x - dataCx) * sx;
          d.y = dataCy + (d.y - dataCy) * sy;
        });
      }

      // DOM更新（tick handler と同じ処理）
      function updateDOM() {
        link
          .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        node.attr("cx", d => d.x).attr("cy", d => d.y);
        updateLabels();
      }

      // 共通: 停止 → リマップ → フィット（zoom確定） → DOM更新
      function fitAll(animate = true) {
        simulation.stop();
        remapToViewport();
        fitToScreen(animate);  // zoom変換を先に確定（currentTransformが正しくなる）
        updateDOM();           // 確定したcurrentTransformでラベル配置
      }
      _fitAll = fitAll;

      // レイアウトを同期計算（一瞬で完了、待ち時間なし）
      // SVGは最初から表示状態。イントロオーバーレイ（background: #0a0e1a）が覆っている。
      // イントロが5秒後にフェードアウトする頃にはSVGは完全に描画済み。
      simulation.stop();
      for (let i = 0; i < 300; i++) simulation.tick();
      fitAll(false);
      animateParticles();
      breathe();
      edgePulse();
      setTimeout(fadeOutIntro, 2000);

      // フィット後はゆるく動く
      simulation.alphaDecay(0.005);
      setTimeout(() => {
        setInterval(() => {
          data.nodes.forEach(n => {
            n.vx += (Math.random() - 0.5) * 0.3;
            n.vy += (Math.random() - 0.5) * 0.3;
          });
          simulation.alpha(0.03).restart();
        }, 3000);
      }, 2000);

      // ラベル位置更新（gグループ内なのでデータ座標で配置）
      function updateLabels() {
        const k = currentTransform.k || 1;
        label
          .attr("x", d => d.x)
          .attr("y", d => d.y - nodeRadius(connectionCount[d.id] || 1) - LABEL_GAP / k)
          .attr("font-size", LABEL_SIZE / k);
      }

      simulation.on("tick", () => {
        link
          .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        node.attr("cx", d => d.x).attr("cy", d => d.y);
        updateLabels();
      });
    });
  </script>
</body>
</html>
